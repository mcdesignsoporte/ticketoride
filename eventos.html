<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticketoride | Eventos</title>
  <meta name="description" content="Cartelera demo de Ticketoride." />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="events">
  <header class="site-header">
    <div class="container nav">
      <a class="brand" href="index.html">
        <img src="assets/img/logo-ticketoride.png" alt="Logo Ticketoride" class="brand-logo" />
        <div class="brand-copy">
          <span class="brand-name">Ticketoride</span>
          <span class="brand-tag">Cartelera de simulación</span>
        </div>
      </a>
      <nav class="menu">
        <a href="index.html">Inicio</a>
        <a href="eventos.html" class="is-active">Eventos</a>
        <a href="mis-boletos.html">Mis boletos</a>
        <a href="scanner.html">Acceso</a>
        <a href="panel.html">Panel</a>
      </nav>
    </div>
  </header>

  <main class="section alt" style="padding-top:42px">
    <div class="container">
      <div class="page-head">
        <div>
          <span class="kicker">Cartelera</span>
          <h1 style="font-size:2.4rem;margin-bottom:10px;">Eventos de simulación</h1>
          <p>La base ya está enfocada en Teatro de la Paz, lista para enseñarla y seguir integrando.</p>
        </div>
      </div>

      <div class="toolbar">
        <input id="filterSearch" type="text" placeholder="Buscar por nombre, sede o ciudad" />
        <select id="filterCategory">
          <option value="all">Todas las categorías</option>
          <option value="Teatro">Teatro</option>
          <option value="Concierto">Concierto</option>
        </select>
        <span class="badge" id="eventsCount">0 evento(s)</span>
      </div>

      <div id="eventsGrid" class="events-grid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-wrap">
      <p>© 2026 Ticketoride</p>
      <p>Powered by <strong>MC Creative Studio</strong> · 444 794 7990</p>
    </div>
  </footer>

  <script src="js/mock-data.js"></script>
  <script src="js/wp-bridge.js"></script>
  <script src="js/app.js"></script>
</body>
